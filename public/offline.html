<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Hostel Mess Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fef7ed 0%, #fed7aa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            color: #f59e0b;
        }
        
        .offline-title {
            font-size: 2rem;
            font-weight: bold;
            color: #92400e;
            margin-bottom: 1rem;
        }
        
        .offline-message {
            font-size: 1.1rem;
            color: #78716c;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .retry-button {
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 20px;
            color: #dc2626;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #dc2626;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .connection-status.online {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.2);
            color: #16a34a;
        }
        
        .connection-status.online .status-dot {
            background: #16a34a;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">🍽️</div>
        <h1 class="offline-title">You're Offline</h1>
        <p class="offline-message">
            It looks like you're not connected to the internet. 
            Please check your connection and try again to view the latest hostel mess menu.
        </p>
        <button class="retry-button" onclick="retryConnection()">
            Try Again
        </button>
        <div class="status-indicator" id="statusIndicator">
            <div class="status-dot"></div>
            <span>Offline</span>
        </div>
    </div>

    <script>
        function retryConnection() {
            window.location.reload();
        }
        
        // Monitor connection status
        function updateConnectionStatus() {
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = statusIndicator.querySelector('span');
            
            if (navigator.onLine) {
                statusIndicator.className = 'status-indicator connection-status online';
                statusText.textContent = 'Back Online!';
                
                // Auto-reload after a short delay when back online
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            } else {
                statusIndicator.className = 'status-indicator';
                statusText.textContent = 'Offline';
            }
        }
        
        // Listen for connection changes
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        
        // Check initial status
        updateConnectionStatus();
        
        // Auto-retry every 30 seconds
        setInterval(() => {
            if (navigator.onLine) {
                window.location.reload();
            }
        }, 30000);
    </script>
</body>
</html>
